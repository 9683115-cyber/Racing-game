<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #scoreboard { position: absolute; top: 10px; left: 10px; background: rgba(255, 255, 255, 0.8); padding: 10px; border-radius: 5px; }
        .building { position: absolute; width: 50px; height: 100px; background: gray; }
    </style>
</head>
<body>
    <h1>Welcome to the Racing Game</h1>
    <div id="scoreboard">
        <h2>Score: <span id="score">0</span></h2>
    </div>
    <div class="building" id="left-building" style="left: 0; top: 300px;"></div>
    <div class="building" id="right-building" style="right: 0; top: 300px;"></div>

    <script>
        let score = 0;
        setInterval(() => {
            score += 10;
            document.getElementById('score').textContent = score;
            // Move buildings to give the effect of progression
            document.getElementById('left-building').style.top = (parseInt(document.getElementById('left-building').style.top) - 1) + 'px';
            document.getElementById('right-building').style.top = (parseInt(document.getElementById('right-building').style.top) - 1) + 'px';
        }, 100);
    </script>
</body>
</html>
